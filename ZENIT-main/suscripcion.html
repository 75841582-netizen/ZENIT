<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZENIT - Subscription</title>
  <link rel="stylesheet" href="estiloHome.css">
  <link rel="stylesheet" href="subscription.css">
</head>

<body>

<div class="dashboard">

  <!-- MENÚ LATERAL (igual al home) -->
  <aside class="side-menu">
    <div class="menu-logo">
      <img src="logoZenit_img.png" alt="ZENIT Logo">
    </div>    

    <ul class="menu-list">
      <li onclick="window.location.href='home.html'">Home</li>
      <li onclick="window.location.href='retos.html'">Retos</li>
      <li onclick="window.location.href='suscripcion.html'" class="active">Suscripción</li>
    </ul>
  </aside>

  <!-- CONTENIDO -->
  <main class="main-content">

    <div class="top-header">
      <h1>Suscripción</h1>
    </div>

    <!-- PLAN -->
<div class="card">
  <h2>Plan PRO</h2>
  <p class="price">S/ 25.00 / mes</p>

  <ul>
    <li>✔ Rutinas premium</li>
    <li>✔ Seguimiento de progreso</li>
    <li>✔ Recomendaciones exclusivas</li>
  </ul>

  <button onclick="mostrarFormulario()">Suscribirme</button>
</div>

<section class="card hidden" id="formSection">

  <h2>Completa tu suscripción</h2>

  <label>Nombre</label>
  <input type="text" id="nombre">

  <label>Correo</label>
  <input type="email" id="email">

  <label>Plan</label>
  <input type="text" value="PRO" disabled>

  <button onclick="procesarSuscripcion()">Confirmar</button>

  <p id="mensaje"></p>

<div style="text-align:center; margin-top:20px;">
  <h3>Método de pago</h3>
  <p><strong>Yape</strong></p>

  <img src="QR_personal.PNG" alt="QR Yape" style="width:200px; border-radius:10px;">

  <p>Escanea el QR y realiza el pago</p>
</div>

</section>
  </main>

</div>

<script src="suscripcion.js"></script>
</body>
</html>
