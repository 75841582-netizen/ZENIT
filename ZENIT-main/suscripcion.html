<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZENIT - Subscription</title>
  <link rel="stylesheet" href="estiloHome.css">
  <link rel="stylesheet" href="subscription.css">
</head>

<body>

<div class="dashboard">

  <!-- MENÚ LATERAL (igual al home) -->
  <aside class="side-menu">
    <div class="menu-logo">
      <img src="img/logo_zenit.png">
    </div>    

    <ul class="menu-list">
      <li onclick="window.location.href='home.html'">Home</li>
      <li onclick="window.location.href='retos.html'">Challenges</li>
      <li onclick="window.location.href='subscription.html'" class="active">Subscription</li>
    </ul>
  </aside>

  <!-- CONTENIDO -->
  <main class="main-content">

    <div class="top-header">
      <h1>Subscription</h1>
    </div>

    <!-- PLAN -->
    <section class="card">
      <h2>PRO Plan</h2>
      <p class="price">S/ 25.00 / month</p>

      <ul>
        <li>✔ Premium routines</li>
        <li>✔ Progress tracking</li>
        <li>✔ Exclusive recommendations</li>
      </ul>

      <button onclick="mostrarFormulario()">Subscribe Now</button>
    </section>

    <!-- FORMULARIO -->
    <section class="card hidden" id="formSection">

      <h2>Complete your subscription</h2>

      <label>Name</label>
      <input type="text" id="name">

      <label>Email</label>
      <input type="email" id="email">

      <label>Plan</label>
      <input type="text" value="PRO Plan" disabled>

      <button onclick="procesarSuscripcion()">Confirm</button>

      <p id="mensaje"></p>

    </section>

  </main>

</div>

<script src="suscripcion.js"></script>
</body>
</html>
