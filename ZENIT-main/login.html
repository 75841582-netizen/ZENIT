<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZENIT - Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="container">

    <div class="card">

      <img src="logoZenit_img.png" class="logo">

      <h1 class="title">ZENIT</h1>

      <h2>Sign In</h2>
      <p class="subtitle">Hello! Welcome.</p>

      <label>Email</label>
      <input type="email" id="email" placeholder="example@email.com">

      <label>Password</label>
      <div class="password-box">
        <input type="password" id="password" placeholder="********">
        <span onclick="togglePassword()">👁</span>
      </div>

      <button class="btn" onclick="login()">Sign In</button>

      <p class="or">or use one of your social profiles</p>

     <div class="social">
  <button class="insta" onclick="goInstagramLogin()">Instagram</button>
  <button class="fb" onclick="goFacebookLogin()">Facebook</button>
  </div>

      <p id="message"></p>

      <div class="bottom">
        <a href="register.html">Sign Up</a>
      </div>

    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
