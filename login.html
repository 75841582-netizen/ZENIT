<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZENIT - Sign In</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="logo-area">
        <img src="logoZenit_img.png" alt="ZENIT Logo" class="logo">
        <div class="brand">ZENIT</div>
    </div>

    <div class="form-box">
      <h1>Sign In</h1>
      <p class="welcome">Hello! Welcome.</p>

      <div class="field-group">
        <label for="email">Email</label>
        <div class="input-line">
          <input type="email" id="email" placeholder="example@email.com">
        </div>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="input-line">
          <input type="password" id="password" placeholder="••••••••••">
          <button class="eye-btn" type="button" onclick="togglePassword()">👁</button>
        </div>
      </div>

      <button class="sign-btn" onclick="login()">Sign In</button>

      <p id="message" class="message"></p>

      <p class="social-text">or use one of your social profiles</p>

      <div class="social-buttons">
        <button class="social-btn instagram">📷 Instagram</button>
        <button class="social-btn facebook">f Facebook</button>
      </div>

      <div class="bottom-links">
        <a href="#" class="forgot">Forgot password?</a>
        <a href="register.html" class="signup">Sign Up</a>
      </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
